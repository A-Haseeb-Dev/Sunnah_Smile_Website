    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#064E3B', // Deep Green
              secondary: '#FDFBF7', // Off-White / Cream
              accent: '#78350F', // Natural Brown
              cta: '#059669', // Bright Green
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
      .font-playfair { font-family: 'Playfair Display', serif; }
      html { scroll-behavior: smooth; }
      
      /* Only apply hidden state if JS is active and GSAP is expected */
      .js-enabled .gsap-reveal { opacity: 0; transform: translateY(30px); }
      .js-enabled .hero-badge, 
      .js-enabled .hero-title, 
      .js-enabled .hero-description, 
      .js-enabled .hero-image-box, 
      .js-enabled .hero-form-container { opacity: 0; }
      
      /* Custom Animations */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
    <script>
      document.documentElement.classList.add('js-enabled');
    </script>
